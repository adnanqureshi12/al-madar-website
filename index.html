<!DOCTYPE html>
<html>
<head>
  <title>Al Madar Traders</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background-color: #f5f5f5;
    }

    header {
      background: #0077b6;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .hero {
      padding: 20px;
      text-align: center;
      background: #caf0f8;
    }

    .box {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 10px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      background-color: #0077b6;
      color: white;
      border: none;
      border-radius: 5px;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 80%;
    }
  </style>
</head>

<body>

<header>
  <h1>💧 Al Madar Traders</h1>
  <p>Pani ke pouch, bottle aur container ke thok vikreta</p>
</header>

<div class="hero">
  <h2>Shuddh Pani, Seedha Aapke Ghar 🚚</h2>
</div>

<div class="box">
  <h2>Hamari Services</h2>
  <p>✔ Pani ke Pouch</p>
  <p>✔ Water Bottles</p>
  <p>✔ 20L Container</p>
  <p>✔ Shaadi & Party Order</p>
</div>

<div class="box">
  <h2>Order Kare</h2>

  <input type="text" id="name" placeholder="Aapka naam"><br>
  <input type="text" id="phone" placeholder="Mobile number"><br>
  <input type="text" id="address" placeholder="Address"><br>

  <button onclick="order()">Order on WhatsApp</button>
</div>

<div class="box">
  <h2>Contact</h2>

  <p>📞 9407139550 / 9302421085</p>

  <button onclick="call()">Call Now</button>
  <button onclick="whatsapp()">WhatsApp</button>
</div>

<div class="box">
  <h2>Location</h2>

  <iframe src="https://www.google.com/maps?q=Jabalpur&output=embed"
    width="100%" height="200"></iframe>
</div>

<script>
  function call() {
    window.location.href = "tel:9407139550";
  }

  function whatsapp() {
    window.location.href = "https://wa.me/919407139550";
  }

  function order() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;

    let msg = "Order:%0AName: " + name + "%0APhone: " + phone + "%0AAddress: " + address;

    window.location.href = "https://wa.me/919407139550?text=" + msg;
  }
</script>

</body>
</html>
